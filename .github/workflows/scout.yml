name: VPN Scout Ultimate

on:
  schedule:
    # Каждые 3 часа в 21 минуту (00:21, 03:21, 06:21, 09:21, 12:21, 15:21, 18:21, 21:21 UTC)
    - cron: '21 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

# Блокируем параллельные запуски - новый ждёт завершения предыдущего
concurrency:
  group: scout-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scout:
    runs-on: ubuntu-latest
    # Жёсткий лимит 30 минут - чтобы не висел часами
    timeout-minutes: 90

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install aiohttp

    - name: Pull latest changes (Sync)
      run: |
        git config --global user.name 'VPN Scout Bot'
        git config --global user.email 'bot@noreply.github.com'
        git pull origin main

    - name: Run Scout Logic
      id: scout_step
      env:
        GTA_TOKEN: ${{ secrets.GTA_TOKEN }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: python scout.py

    - name: Commit and Push changes
      run: |
        git add *.txt 2>/dev/null || true
        
        if git diff --cached --quiet; then
          echo "No changes to commit."
          exit 0
        fi
        
        git commit -m "Scout Update $(date +'%Y-%m-%d %H:%M:%S')"
        git push origin main
